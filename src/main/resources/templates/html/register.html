<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="/css/form.css">
    
    <title>Registrarse - ZapaJuan</title>
</head>
<body>
    <header class="py-4">
        <div class="container text-center">
            <a href="/">
                <img src="/imagenes/logoTienda.png" alt="Logo ZapaJuan" style="height: 80px; width: auto;">
            </a>
        </div>
    </header>
    
    <div class="container d-flex justify-content-center align-items-center mb-5">
        <div class="card shadow-lg" style="width: 100%; max-width: 500px; border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4 fw-bold">Crear Cuenta</h2>
                
                <form th:action="@{/usuarios/registrar}" th:object="${usuarioForm}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" th:field="*{apellido}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombre de Usuario</label>
                        <input type="text" th:field="*{usuario}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" th:field="*{contrasena}" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Registrar</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">¿Ya tienes cuenta? 
                        <a href="/login" class="text-decoration-none fw-bold">Inicia sesión</a>
                    </p>
                    <hr>
                    <a href="/" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
