<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/form.css">
    <title>Registrarse ZapaJuan</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="text-center">
                <img src="../imagenes/logoTienda.png" alt="Logo ZapaJuan" class="logo">
            </div>
        </div>
    </header>
    
    <div class="container d-flex justify-content-center align-items-center">
        <div class="card shadow-lg" style="width: 100%; max-width: 600px;">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Crear Cuenta</h2>
                
                <form th:action="@{/registro}" method="post">
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="tu@correo.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Elige un usuario" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="contrasena" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="Crea una contraseña segura" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirmar" class="form-label">Confirmar Contraseña</label>
                        <input type="password" class="form-control" id="confirmar" name="confirmar" placeholder="Confirma tu contraseña" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Registrarse
                    </button>
                </form>
                
                <p class="text-center mb-0">¿Ya tienes una cuenta? 
                    <a th:href="@{/login}" class="text-decoration-none">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
