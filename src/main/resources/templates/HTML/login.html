<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/form.css">
    <title>Iniciar sesion ZapaJuan</title>
</head>
<body>  

    <header>
        <div class="container">
            <div class="text-center">
                <img src="../imagenes/logoTienda.png" alt="Logo ZapaJuan" class="logo">
            </div>
        </div>
    </header>
    
    <div class="container d-flex justify-content-center align-items-center">
        <div class="card shadow-lg" style="width: 100%; max-width: 600px;">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>
                <form action="index.html" method="post">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Usuario" required>
                    </div>
                    
                    <div class="mb-3">
                        <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="Contraseña" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3"><i class="bi bi-door-open me-2"></i>Iniciar Sesión</button>
                </form>
                
                <p class="text-center mb-0">¿No tienes una cuenta? <a href="register.html" class="text-decoration-none">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
